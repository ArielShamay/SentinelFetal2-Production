services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: ["uv", "run", "--frozen", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./api:/app/api
      - ./src:/app/src
      - ./generator:/app/generator
      - ./scripts:/app/scripts
      - ./config:/app/config
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./weights:/app/weights
      - ./logs:/app/logs
    environment:
      - GOD_MODE_ENABLED=${GOD_MODE_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WATCHFILES_FORCE_POLLING=true
      - 'CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost:80"]'
    healthcheck:
      test:
        - "CMD"
        - "uv"
        - "run"
        - "--frozen"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_PROXY_TARGET=http://backend:8000
      - VITE_WS_PROXY_TARGET=ws://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
